name: Deploy to Cloudflare Workers

# Déclenche un déploiement à chaque push sur main, ou manuellement.
# Prérequis (Settings → Secrets and variables → Actions) :
#   - CLOUDFLARE_API_TOKEN : token Cloudflare avec scopes "Workers Scripts:Edit"
#     et "Account Settings:Read"
#   - CLOUDFLARE_ACCOUNT_ID : ID du compte Cloudflare propriétaire du worker

on:
  push:
    branches: [main]
  workflow_dispatch:

# Empêche deux deploys concurrents sur la même branche
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Astro site
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm dlx wrangler@4 deploy
